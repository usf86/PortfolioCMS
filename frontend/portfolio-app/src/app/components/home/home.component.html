<!-- src/app/components/home/home.component.html -->

<div *ngIf="!isLoading && config">

  <!-- ===== Navigation sticky ===== -->
  <nav class="sticky top-0 z-50 bg-white shadow-md">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center h-16">

        <!-- Logo + nom -->
        <div class="flex items-center gap-2">
          <img [src]="config.profile.logoUrl" alt="Logo" class="h-10 w-10 object-contain" />
          <span class="font-bold text-lg" style="color: var(--color-primary)">
            {{ config.profile.businessName }}
          </span>
        </div>

        <!-- Liens desktop -->
        <div class="hidden md:flex gap-8">
          <a href="#about" class="text-gray-700 hover:text-[var(--color-primary)] transition" (click)="scrollToSection('about', $event)">À propos</a>
          <a href="#gallery" class="text-gray-700 hover:text-[var(--color-primary)] transition" (click)="scrollToSection('gallery', $event)">Galerie</a>
          <a href="#products" class="text-gray-700 hover:text-[var(--color-primary)] transition" (click)="scrollToSection('products', $event)">Produits</a>
          <a href="#contact" class="text-gray-700 hover:text-[var(--color-primary)] transition" (click)="scrollToSection('contact', $event)">Contact</a>
        </div>

        <!-- Bouton hamburger (mobile uniquement) -->
        <button class="md:hidden text-2xl" (click)="isMenuOpen = !isMenuOpen" aria-label="Menu">
          ☰
        </button>
      </div>

      <!-- Menu mobile déroulant -->
      <div *ngIf="isMenuOpen" class="md:hidden flex flex-col gap-3 pb-4">
        <a href="#about" class="text-gray-700" (click)="scrollToSection('about', $event)">À propos</a>
        <a href="#gallery" class="text-gray-700" (click)="scrollToSection('gallery', $event)">Galerie</a>
        <a href="#products" class="text-gray-700" (click)="scrollToSection('products', $event)">Produits</a>
        <a href="#contact" class="text-gray-700" (click)="scrollToSection('contact', $event)">Contact</a>
      </div>
    </div>
  </nav>

  <!-- ===== Conteneur principal (avec padding latéral) ===== -->
  <div class="portfolio-wrapper">

    <!-- En-tête / Hero -->
    <header class="hero">
      <h1>{{ config.profile.businessName }}</h1>
      <p class="slogan">{{ config.profile.slogan }}</p>
    </header>

    <!-- Sections dynamiques (À propos, Galerie) -->
    <app-about *ngIf="aboutSection" [section]="aboutSection"></app-about>
    <app-gallery *ngIf="gallerySection" [section]="gallerySection"></app-gallery>

    <!-- Produits / Services groupés par catégorie -->
    <app-products *ngIf="config.products?.length" [products]="config.products"></app-products>

    <!-- Témoignages -->
    <section class="testimonials" *ngIf="config.testimonials.length">
      <h2>Avis de nos clients</h2>
      <div class="testimonial-card" *ngFor="let t of config.testimonials">
        <p>&laquo; {{ t.comment }} &raquo;</p>
        <strong>{{ t.authorName }}</strong> — {{ t.rating }}/5
      </div>
    </section>

    <!-- Contact / Horaires -->
    <app-contact [profile]="config.profile" [openingHours]="config.openingHours"></app-contact>
  </div>
</div>

<div class="loading" *ngIf="isLoading">Chargement du site en cours...</div>
<div class="error" *ngIf="errorMessage">{{ errorMessage }}</div>
