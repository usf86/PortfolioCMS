<div *ngIf="!isLoading && profile" class="portfolio-wrapper">
  <header class="hero">
    <h1>{{ profile.businessName }}</h1>
    <p class="slogan">{{ profile.slogan }}</p>
  </header>

  <section class="testimonials" *ngIf="testimonials.length">
    <h2>Avis de nos clients</h2>
    <div class="testimonial-card" *ngFor="let t of testimonials">
      <p>&laquo; {{ t.comment }} &raquo;</p>
      <strong>{{ t.authorName }}</strong> — {{ t.rating }}/5
    </div>
  </section>
</div>

<div class="loading" *ngIf="isLoading">Chargement du site en cours...</div>
<div class="error" *ngIf="errorMessage">{{ errorMessage }}</div>
