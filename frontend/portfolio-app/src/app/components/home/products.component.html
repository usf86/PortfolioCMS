<section class="content-section products-section" *ngIf="products?.length">
  <h2>Nos produits</h2>

  <div *ngFor="let group of groupProductsByCategory(products) | keyvalue" class="product-category">
    <h3>{{ group.key }}</h3>
    <div class="product-grid">
      <article class="product-card" *ngFor="let product of group.value">
        <img *ngIf="product.imageUrl" [src]="product.imageUrl" [alt]="product.title" class="product-image" />
        <div class="product-details">
          <h4>{{ product.title }}</h4>
          <p *ngIf="product.description">{{ product.description }}</p>
          <p *ngIf="product.price !== undefined" class="product-price">
            <strong>{{ product.price | currency:'EUR':'symbol':'1.0-0' }}</strong>
            <span *ngIf="product.priceUnit"> / {{ product.priceUnit }}</span>
          </p>
        </div>
      </article>
    </div>
  </div>
</section>
